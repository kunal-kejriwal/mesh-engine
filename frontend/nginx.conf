server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Proxy API calls to the FastAPI backend
    location /api/ {
        proxy_pass         http://control_plane:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket connections
    location /ws/ {
        proxy_pass         http://control_plane:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Serve markdown docs as static files (fetched by the Docs viewer)
    location /docs/ {
        # Already baked into /usr/share/nginx/html/docs/ by the build stage
        try_files $uri =404;
    }
}
