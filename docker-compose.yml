version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: meshengine
      POSTGRES_USER: meshuser
      POSTGRES_PASSWORD: meshpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshuser -d meshengine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  control_plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://meshuser:meshpass@postgres/meshengine
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./control-plane:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  node_worker:
    build:
      context: ./node-worker
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
      - CONTROL_PLANE_URL=http://control_plane:8000
      - WORKER_ID=worker-1
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .                      # root context so .md files are included
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - control_plane
    restart: unless-stopped

volumes:
  postgres_data:
